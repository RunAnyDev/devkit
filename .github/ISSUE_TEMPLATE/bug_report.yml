name: Bug report
description: Report a reproducible problem in DevKit
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Clear reproduction steps help us fix it faster.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Describe bug briefly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps.
      placeholder: |
        1. Open ...
        2. Paste ...
        3. Click ...
        4. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 125, Firefox 126, Safari 17
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS, Windows, Linux, iOS, Android
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add screenshots, sample input, or console errors if useful. Do not include secrets.
